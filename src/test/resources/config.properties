# CONFIGURAÇÃO BASE
# Este arquivo representa os valores padrão da suíte.
# Os perfis Maven podem sobrescrever estes valores para cenários específicos.
# Perfis disponíveis: smoke-local | smoke-mobile | regression-parallel | demo-apresentacao | nightly-complete

# URL base do sistema alvo.
# Exemplo padrão: https://www.saucedemo.com/
base.url=https://www.saucedemo.com/

# Executa o navegador em segundo plano.
# Valores: true | false
# Padrão: true
headless=true

# Atraso entre ações do Playwright em milissegundos.
# Exemplo padrão: 0 | 200 | 500
slow.mo=0

# Quantidade de retestes automáticos em caso de falha.
# Exemplo padrão: 0 | 1 | 2
retry.count=0

# Salva screenshot quando o teste passar.
# Valores: true | false
# Padrão: false
screenshot.on.success=false

# Salva screenshot quando o teste falhar.
# Valores: true | false
# Padrão: true
screenshot.on.failure=true

# Gera documento de aceite com evidência passo a passo e telas.
# Valores: true | false
# Padrão: false
acceptance.doc.enabled=false

# Formato do documento gerado.
# Valores: pdf | doc | all
# Padrão: pdf
acceptance.doc.format=pdf

# Pasta de saída dos documentos de aceite.
# Exemplo padrão: target/acceptance-docs
acceptance.doc.output.dir=target/acceptance-docs

# Liga a coleta de métricas de execução.
# Valores: true | false
# Padrão: true
metrics.enabled=true

# Nome do cliente para rastrear os resultados.
# Exemplo padrão: demo-client
client.name=demo-client

# Nome do ambiente executado.
# Exemplos: local | dev | homolog | prod
environment.name=local

# Identificação da execução ou versão do build.
# Exemplo padrão: manual-run
build.tag=manual-run

# Ativa a gravação das métricas no banco via Hibernate.
# Valores: true | false
# Padrão: false
db.enabled=false

# URL JDBC completa do banco.
# Exemplo PostgreSQL: jdbc:postgresql://localhost:5432/qa_metrics
# Exemplo MySQL: jdbc:mysql://localhost:3306/qa_metrics
# Exemplo SQL Server: jdbc:sqlserver://localhost:1433;databaseName=qa_metrics;encrypt=true;trustServerCertificate=true
db.url=jdbc:postgresql://localhost:5432/qa_metrics

# Host do banco de dados.
# Exemplo padrão: localhost
db.host=localhost

# Porta do banco de dados.
# Exemplo padrão PostgreSQL: 5432
db.port=5432

# Nome do banco de dados.
# Exemplo padrão: qa_metrics
db.name=qa_metrics

# Usuário do banco.
# Exemplo padrão: qa_user
db.user=qa_user

# Senha do banco.
# Exemplo padrão: qa_pass
db.password=qa_pass

# Schema usado para armazenar as métricas.
# Exemplo padrão: qa_automation
db.schema=qa_automation

# Driver JDBC.
# PostgreSQL: org.postgresql.Driver
# MySQL: com.mysql.cj.jdbc.Driver
# SQL Server: com.microsoft.sqlserver.jdbc.SQLServerDriver
db.driver=org.postgresql.Driver

# Dialeto do Hibernate.
# Pode ficar vazio para autodetectar na maioria dos casos.
# Exemplos: org.hibernate.dialect.PostgreSQLDialect | org.hibernate.dialect.MySQLDialect
hibernate.dialect=

# Estratégia de criação/atualização do schema pelo Hibernate.
# Valores comuns: update | validate | create | create-drop | none
# Padrão: update
hibernate.ddl.auto=update

# Mostra os SQLs gerados pelo Hibernate no console.
# Valores: true | false
# Padrão: false
hibernate.show.sql=false

# Define se a conexão com o banco usa SSL.
# Valores: true | false
# Padrão: false
db.ssl=false

# Ativa execução paralela da suíte.
# Valores: true | false
# Padrão: false
parallel.enabled=false

# Quantidade de threads paralelas.
# Exemplo padrão: 1 | 2 | 4
parallel.threads=1

# Perfil de dispositivo para responsividade.
# Valores: desktop | smartphone | tablet | wide | ultrawide
# Padrão: desktop
device.profile=desktop

# Largura da viewport.
# Exemplos: 390 | 820 | 1440 | 1920 | 2560
viewport.width=1440

# Altura da viewport.
# Exemplos: 844 | 1180 | 900 | 1080 | 1440
viewport.height=900

# Força emulação mobile.
# Valores: true | false
# Padrão: false
is.mobile=false

# Força comportamento touch.
# Valores: true | false
# Padrão: false
has.touch=false
